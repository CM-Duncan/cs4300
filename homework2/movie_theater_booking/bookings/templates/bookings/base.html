<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Movie Theater{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #003135; color: #ffffff; }
        .navbar { background-color: #ffffff !important; border-bottom: 2px solid #0FA4AF; }
        .navbar-brand { color: #AFDDE5 !important; font-weight: bold; }
        .btn-outline-light { border-color: #0FA4AF; color: #ffffff; }
        .btn-outline-light:hover { background-color: #0FA4AF; color: #003135; }
        .card { background-color: #024950; border: 1px solid #0FA4AF; color: #ffffff; }
        .card-text { color: #ffffff; }
        .text-secondary { color: #ffffff !important; opacity: 0.6; }
        .btn-primary { background-color: #964734; border: none; color: #AFDDE5; }
        .btn-primary:hover { background-color: #7a3828; }
        h2 { color: #0FA4AF; }
        .table-dark { background-color: #024950; }
        .table-dark th { background-color: #003135; color: #ffffff; }
        .table-striped tbody tr:nth-of-type(odd) { background-color: #024950; }
        .table-striped tbody tr:nth-of-type(even) { background-color: #003135; }
        small { color: #ffffff; opacity: 0.7; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fs-4 fw-bold" href="/">🎬 Movie Theater</a>
    <div>
        <a class="btn btn-dark me-2" href="/">Movies</a>
        <a class="btn btn-dark" href="/bookings/history/">My Bookings</a>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
